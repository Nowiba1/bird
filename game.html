<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flap Royale - Game</title>
    <link rel="stylesheet" href="main.css">
    <style>
        #gameCanvas { position:fixed; top:0; left:0; width:100%; height:100%; background:#70c5ce; }
        .hud { position:fixed; top:10px; left:50%; transform:translateX(-50%); z-index:10; display:flex; gap:20px; }
        .hud div { background:rgba(0,0,0,0.5); color:#fff; padding:8px 16px; border-radius:20px; font-weight:700; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="hud">
        <div id="aliveHud">🟢 0</div>
        <div id="scoreHud">🏆 0</div>
    </div>
    <script src="firebase.js"></script>
    <script src="bird.js"></script>
    <script src="pipes.js"></script>
    <script src="input.js"></script>
    <script src="game.js"></script>
</body>
</html>
