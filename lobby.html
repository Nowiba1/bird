<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flap Royale - Lobby</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0a1a; color:#fff; font-family:'Segoe UI',sans-serif; }
        .container { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:20px; padding:20px; }
        h1 { font-size:2.5rem; color:#ffdd00; }
        .code { font-size:2.5rem; letter-spacing:10px; font-weight:900; }
        .players { font-size:1.2rem; color:#ccc; }
        .status { color:#aaa; }
        .btn { padding:15px 50px; font-size:1.2rem; border:none; border-radius:10px; cursor:pointer; font-weight:700; }
        .start { background:#ffdd00; color:#000; display:none; }
        .leave { background:transparent; color:#fff; border:1px solid #fff; margin-top:10px; padding:10px 30px; }
        .copy { background:rgba(255,255,255,0.1); color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:0.9rem; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="container">
        <h1>🐤 LOBBY</h1>
        <div class="code" id="roomCode">----</div>
        <button class="copy" id="copyBtn">📋 Copy Code</button>
        <div class="players" id="playerList">Players: ...</div>
        <p class="status" id="status">Waiting for players...</p>
        <button class="btn start" id="startBtn">👑 START GAME</button>
        <button class="btn leave" id="leaveBtn">Leave</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB5WWU8JzA8mIrDKrhKy336jQ6mKOT7FUs",
            authDomain: "snake-ftw.firebaseapp.com",
            databaseURL: "https://snake-ftw-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "snake-ftw",
            storageBucket: "snake-ftw.firebasestorage.app",
            messagingSenderId: "786454070390",
            appId: "1:786454070390:web:97c2f2ab60922513b90b57"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const roomCode = sessionStorage.getItem('roomCode');
        const isHost = sessionStorage.getItem('isHost') === 'true';
        const playerName = sessionStorage.getItem('playerName');
        const birdColor = sessionStorage.getItem('birdColor');
        const playerId = 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2,4);
        sessionStorage.setItem('playerId', playerId);

        document.getElementById('roomCode').textContent = roomCode;

        const roomRef = db.ref('rooms/' + roomCode);
        const playersRef = db.ref('rooms/' + roomCode + '/players');

        // Join room
        playersRef.child(playerId).set({
            name: playerName,
            color: birdColor,
            alive: true,
            y: 0.5,
            score: 0,
            joinedAt: firebase.database.ServerValue.TIMESTAMP
        });
        playersRef.child(playerId).onDisconnect().remove();

        if (isHost) {
            roomRef.child('host').set(playerId);
        }

        // Player list listener
        playersRef.on('value', snap => {
            const data = snap.val() || {};
            const names = Object.values(data).map(p => p.name).join(', ');
            document.getElementById('playerList').textContent = 'Players: ' + (names || 'none');
            const count = Object.keys(data).length;
            document.getElementById('status').textContent = count + ' player(s) connected';
            if (isHost && count >= 2) {
                document.getElementById('startBtn').style.display = 'block';
            }
        });

        // Start button
        document.getElementById('startBtn').addEventListener('click', async () => {
            await roomRef.update({
                state: 'playing',
                startTime: firebase.database.ServerValue.TIMESTAMP
            });
        });

        // Game start redirect
        roomRef.child('state').on('value', snap => {
            if (snap.val() === 'playing') {
                location.href = 'game.html';
            }
        });

        // Copy button
        document.getElementById('copyBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(roomCode).then(() => {
                document.getElementById('copyBtn').textContent = '✅ Copied!';
            });
        });

        // Leave button
        document.getElementById('leaveBtn').addEventListener('click', () => {
            playersRef.child(playerId).remove();
            location.href = 'index.html';
        });
    </script>
</body>
</html>
